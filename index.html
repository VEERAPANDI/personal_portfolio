  <!-- Google Analytics snippet logic. Wrapped in a function for GDPR consent -->
  <script>
    window.loadGoogleAnalytics = function() {
      if (window.gaLoaded) return;
      const gaTrackingId = "%VITE_GA_TRACKING_ID%";
      if (gaTrackingId && !gaTrackingId.startsWith('%')) {
        const script = document.createElement('script');
        script.async = true;
        script.src = `https://www.googletagmanager.com/gtag/js?id=${gaTrackingId}`;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', gaTrackingId);
        window.gaLoaded = true;
      }
    };
  </script>

  <!-- Tawk.to Live Chat snippet -->
  <script>
    const tawkPropertyId = "%VITE_TAWK_PROPERTY_ID%";
    const tawkWidgetId = "%VITE_TAWK_WIDGET_ID%";
    const widgetId = tawkWidgetId && !tawkWidgetId.startsWith('%') ? tawkWidgetId : 'default';
    
    if (tawkPropertyId && !tawkPropertyId.startsWith('%')) {
      var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
      
      // Force position to bottom-left as requested
      Tawk_API.customStyle = {

          mobile: { position: 'bl', xOffset: '15px', yOffset: '15px' }
        }
      };

      (function () {
        var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        s1.src = `https://embed.tawk.to/${tawkPropertyId}/${widgetId}`;
        s1.charset = 'UTF-8';
        s1.setAttribute('crossorigin', '*');
        s0.parentNode.insertBefore(s1, s0);
      })();
    }
